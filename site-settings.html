<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="ui.css">
</head>
<body>
  <div class="app">
    <header class="page-head">
      <div class="page-top">
        <button class="back-btn" id="backBtn">화면 보조</button>
        <button class="icon-btn" id="globalSettingsBtn" title="전체 설정">⚙</button>
      </div>
      <h1 class="page-title">화면 보조 기록 관리</h1>
      <p class="page-subtitle">자주 켜고 끄는 기능은 화면 보조 페이지에서 바로 조작하고, 이곳에서는 기록만 관리합니다.</p>
    </header>
    <main class="page">
      <section class="card">
        <div class="card-header">
          <div class="title-group">
            <span class="mark teal">읽</span>
            <div>
              <div class="card-title">읽음 기록</div>
              <div class="card-subtitle">목록에서 회색으로 표시할 자유게시판 글 기록입니다.</div>
            </div>
          </div>
          <span id="readPostCountBadge" class="badge">확인 중</span>
        </div>
        <div class="card-body">
          <div class="list" id="readPostList">
            <div class="empty-state">읽음 기록을 불러오는 중...</div>
          </div>
          <button id="clearReadPostsBtn" class="btn btn-secondary" style="width:100%;margin-top:10px;">읽음 기록 삭제</button>
        </div>
      </section>
    </main>
  </div>
  <div class="toast" id="toast"></div>
  <script src="site-settings.js"></script>
</body>
</html>
