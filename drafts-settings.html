<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="ui.css">
</head>
<body>
  <div class="app">
    <header class="page-head">
      <div class="page-top">
        <button class="back-btn" id="backBtn">← 임시저장</button>
        <button class="icon-btn" id="globalSettingsBtn" title="전체 설정">⚙</button>
      </div>
      <h1 class="page-title">임시저장 설정</h1>
      <p class="page-subtitle">저장된 글/댓글 목록과 삭제를 관리합니다.</p>
    </header>
    <main class="page">
      <section class="card">
        <div class="card-header">
          <div class="title-group">
            <span class="mark purple">목</span>
            <div>
              <div class="card-title">저장 목록</div>
              <div class="card-subtitle">복구는 해당 글쓰기 화면에서 표시됩니다.</div>
            </div>
          </div>
          <span id="draftCountBadge" class="badge">확인 중</span>
        </div>
        <div class="card-body">
          <div class="list" id="draftList">
            <div class="empty-state">임시저장 목록을 불러오는 중...</div>
          </div>
          <button id="clearDraftsBtn" class="btn btn-secondary" style="width:100%;margin-top:10px;">임시저장 데이터 삭제</button>
        </div>
      </section>
    </main>
  </div>
  <div class="toast" id="toast"></div>
  <script src="drafts-settings.js"></script>
</body>
</html>
