<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="ui.css">
</head>
<body>
  <div class="app">
    <header class="page-head">
      <div class="page-top">
        <button class="back-btn" id="backBtn">← 홈</button>
        <div class="top-actions">
          <button class="back-btn" id="featureSettingsBtn">자동 알림 설정</button>
          <button class="icon-btn" id="globalSettingsBtn" title="전체 설정">⚙</button>
        </div>
      </div>
      <h1 class="page-title">자동 알림</h1>
      <p class="page-subtitle">시간, 조건, 행동을 조합해 필요한 순간에만 실행합니다.</p>
    </header>
    <main class="page">
      <section class="card">
        <div class="card-header">
          <div class="title-group">
            <span class="mark teal">자</span>
            <div>
              <div class="card-title">자동 알림 상태</div>
              <div class="card-subtitle">켜진 알림과 최근 실행 결과입니다.</div>
            </div>
          </div>
          <span id="automationBadge" class="badge pending">확인 중</span>
        </div>
        <div class="card-body">
          <div class="metric-grid">
            <div class="metric">
              <span class="metric-label">활성 알림</span>
              <span id="activeRuleCount" class="metric-value">확인 중...</span>
            </div>
            <div class="metric">
              <span class="metric-label">전체 알림</span>
              <span id="totalRuleCount" class="metric-value">확인 중...</span>
            </div>
          </div>
        </div>
      </section>

      <section class="card">
        <div class="card-header">
          <div class="title-group">
            <span class="mark blue">목</span>
            <div>
              <div class="card-title">알림 목록</div>
              <div class="card-subtitle">미리 만들어진 알림을 켜고 수정할 수 있습니다.</div>
            </div>
          </div>
        </div>
        <div class="card-body">
          <div id="automationList" class="list">
            <div class="empty-state">자동 알림을 불러오는 중...</div>
          </div>
        </div>
      </section>
    </main>
  </div>
  <script src="automation.js"></script>
</body>
</html>
