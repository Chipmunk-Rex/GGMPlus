<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="ui.css">
</head>
<body>
  <div class="app">
    <header class="page-head">
      <div class="page-top">
        <button class="back-btn" id="backBtn">← 홈</button>
        <div class="top-actions">
          <button class="back-btn" id="featureSettingsBtn">임시저장 설정</button>
          <button class="icon-btn" id="globalSettingsBtn" title="전체 설정">⚙</button>
        </div>
      </div>
      <h1 class="page-title">임시저장</h1>
      <p class="page-subtitle">글과 댓글 입력 중 저장 상태만 간단히 확인합니다.</p>
    </header>
    <main class="page">
      <section class="card">
        <div class="card-header">
          <div class="title-group">
            <span class="mark purple">글</span>
            <div>
              <div class="card-title">자동 임시저장</div>
              <div class="card-subtitle">작성 중인 내용은 브라우저 로컬에만 보관됩니다.</div>
            </div>
          </div>
          <span class="badge success">활성</span>
        </div>
        <div class="card-body">
          <div class="metric-grid">
            <div class="metric">
              <span class="metric-label">저장된 항목</span>
              <span id="draftCount" class="metric-value">확인 중...</span>
            </div>
            <div class="metric">
              <span class="metric-label">복구 위치</span>
              <span class="metric-value">작성 화면</span>
            </div>
          </div>
          <p class="hint">저장 목록과 삭제는 임시저장 설정에서 관리합니다.</p>
        </div>
      </section>
    </main>
  </div>
  <script src="drafts.js"></script>
</body>
</html>
