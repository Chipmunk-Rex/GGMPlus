<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="ui.css">
</head>
<body>
  <div class="app">
    <header class="page-head">
      <div class="page-top">
        <button class="back-btn" id="backBtn">뒤로</button>
        <div class="top-actions">
          <button class="back-btn" id="featureSettingsBtn">기록 관리</button>
          <button class="icon-btn" id="globalSettingsBtn" title="전체 설정">⚙</button>
        </div>
      </div>
      <h1 class="page-title">사이트 화면 보조</h1>
      <p class="page-subtitle">GGM Town 화면 위에 바로 적용되는 편의 기능만 모았습니다.</p>
    </header>
    <main class="page">
      <section class="card">
        <div class="card-header">
          <div class="title-group">
            <span class="mark teal">켜</span>
            <div>
              <div class="card-title">바로 켜고 끄기</div>
              <div class="card-subtitle">자주 쓰는 화면 보조 기능은 이 페이지에서 바로 적용됩니다.</div>
            </div>
          </div>
          <span id="featureBadge" class="badge pending">확인 중</span>
        </div>
        <div class="card-body">
          <div class="toggle-grid single">
            <label class="toggle-card">
              <input type="checkbox" id="showFloatingPanelToggle">
              <span class="toggle-visual"></span>
              <span class="toggle-name">사이트 오른쪽 아래 GGMPlus 버튼 표시</span>
            </label>
            <label class="toggle-card">
              <input type="checkbox" id="markReadPostsToggle">
              <span class="toggle-visual"></span>
              <span class="toggle-name">읽은 자유게시판 글 회색 표시</span>
            </label>
          </div>
          <p class="hint">토글을 바꾸면 바로 저장됩니다.</p>
        </div>
      </section>

      <section class="card">
        <div class="card-header">
          <div class="title-group">
            <span class="mark green">읽</span>
            <div>
              <div class="card-title">자유게시판 읽음 표시</div>
              <div class="card-subtitle">읽은 글 기록과 바로가기를 확인합니다.</div>
            </div>
          </div>
          <span id="readPostBadge" class="badge pending">확인 중</span>
        </div>
        <div class="card-body">
          <div class="metric-grid">
            <div class="metric">
              <span class="metric-label">저장된 읽음</span>
              <span id="readPostCount" class="metric-value">확인 중...</span>
            </div>
            <div class="metric">
              <span class="metric-label">적용 위치</span>
              <span class="metric-value">자유게시판</span>
            </div>
          </div>
          <div class="btn-row">
            <button id="openFreeboardBtn" class="btn btn-primary">자유게시판 열기</button>
            <button id="openSettingsBtn" class="btn btn-secondary">기록 관리</button>
          </div>
        </div>
      </section>
    </main>
  </div>
  <div class="toast" id="toast"></div>
  <script src="site.js"></script>
</body>
</html>
