<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="ui.css">
</head>
<body>
  <div class="app">
    <header class="page-head">
      <div class="page-top">
        <button class="back-btn" id="backBtn">← 알림</button>
        <button class="icon-btn" id="globalSettingsBtn" title="전체 설정">⚙</button>
      </div>
      <h1 class="page-title">알림 설정</h1>
      <p class="page-subtitle">관심 알림 대상, 확인 간격, 최근 알림 기록을 관리합니다.</p>
    </header>
    <main class="page">
      <section class="card">
        <div class="card-header">
          <div class="title-group">
            <span class="mark orange">알</span>
            <div>
              <div class="card-title">알림 대상</div>
              <div class="card-subtitle">필요한 알림만 켜두세요.</div>
            </div>
          </div>
        </div>
        <div class="card-body">
          <div class="toggle-grid">
            <label class="toggle-card">
              <input id="notifyNewPostsInput" type="checkbox">
              <span class="toggle-visual"></span>
              <span class="toggle-name">새 글</span>
            </label>
            <label class="toggle-card">
              <input id="notifyGoldboxQuestInput" type="checkbox">
              <span class="toggle-visual"></span>
              <span class="toggle-name">퀘스트</span>
            </label>
            <label class="toggle-card">
              <input id="notifyStockWatchInput" type="checkbox">
              <span class="toggle-visual"></span>
              <span class="toggle-name">주식</span>
            </label>
          </div>
          <div class="field">
            <label for="utilityIntervalInput">확인 간격(분)</label>
            <input class="setting-input" id="utilityIntervalInput" type="number" min="5" max="1440" step="1">
          </div>
          <div class="field">
            <label for="boardCategoriesInput">게시판 카테고리</label>
            <input class="setting-input" id="boardCategoriesInput" type="text" placeholder="free, dev">
          </div>
          <div class="grid-2">
            <div class="field">
              <label for="circlePostIdsInput">관심 게시글 ID</label>
              <input class="setting-input" id="circlePostIdsInput" type="text" placeholder="1, 2, 3">
            </div>
            <div class="field">
              <label for="stockWatchIdsInput">관심 동아리 ID</label>
              <input class="setting-input" id="stockWatchIdsInput" type="text" placeholder="1, 2, 3">
            </div>
          </div>
          <div class="btn-row">
            <button class="btn btn-primary" id="saveFeatureSettingsBtn">알림 저장</button>
            <button class="btn btn-secondary" id="runMonitorBtn">지금 확인</button>
          </div>
        </div>
      </section>
      <section class="card">
        <div class="card-header">
          <div class="title-group">
            <span class="mark green">기</span>
            <div>
              <div class="card-title">최근 알림 기록</div>
              <div class="card-subtitle">관심 알림 실행 결과입니다.</div>
            </div>
          </div>
        </div>
        <div class="card-body">
          <div class="list" id="activityContainer">
            <div class="empty-state">기록을 불러오는 중...</div>
          </div>
        </div>
      </section>
    </main>
  </div>
  <div class="toast" id="toast"></div>
  <script src="alerts-settings.js"></script>
</body>
</html>
