<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GGMPlus Settings</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      width: 380px;
      min-height: 500px;
      padding: 16px;
      font-family: "Segoe UI", sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: #fff;
    }

    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
    }

    .section {
      margin-bottom: 12px;
      padding: 14px;
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.15);
      backdrop-filter: blur(10px);
    }

    .section-title {
      margin-bottom: 10px;
      font-size: 13px;
      font-weight: 700;
    }

    .setting-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
    }

    .setting-row:last-child {
      margin-bottom: 0;
    }

    .status-value {
      font-size: 13px;
      font-weight: 700;
    }

    .status-value.success {
      color: #4ade80;
    }

    .status-value.pending {
      color: #fbbf24;
    }

    .btn {
      width: 100%;
      padding: 10px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 700;
    }

    .btn + .btn {
      margin-top: 8px;
    }

    .btn-save {
      background: #4ade80;
      color: #1a1a2e;
    }

    .btn-secondary {
      background: rgba(255, 255, 255, 0.2);
      color: #fff;
    }

    .btn-danger {
      background: #f87171;
      color: #fff;
    }

    .btn-row {
      display: flex;
      gap: 8px;
    }

    .btn-row .btn {
      margin-top: 0;
      flex: 1;
    }

    .back-btn {
      border: none;
      border-radius: 6px;
      background: rgba(255, 255, 255, 0.2);
      color: #fff;
      cursor: pointer;
      padding: 6px 12px;
    }

    .log-container {
      max-height: 180px;
      overflow-y: auto;
      padding: 10px;
      border-radius: 8px;
      background: rgba(0, 0, 0, 0.3);
      font-family: Consolas, monospace;
      font-size: 11px;
      line-height: 1.5;
    }

    .log-entry {
      padding: 4px 0;
      cursor: pointer;
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
    }

    .log-entry:last-child {
      border-bottom: none;
    }

    .log-success {
      color: #4ade80;
    }

    .log-error {
      color: #f87171;
    }

    .log-info {
      color: #fbbf24;
    }

    .log-time {
      margin-right: 8px;
      color: rgba(255, 255, 255, 0.6);
    }

    .toast {
      position: fixed;
      left: 50%;
      bottom: 20px;
      transform: translateX(-50%);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s ease;
      padding: 10px 20px;
      border-radius: 8px;
      background: rgba(0, 0, 0, 0.8);
      color: #fff;
      font-size: 13px;
    }

    .toast.show {
      opacity: 1;
    }

    .modal-overlay {
      position: fixed;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 20px;
      background: rgba(0, 0, 0, 0.7);
    }

    .modal-overlay.show {
      display: flex;
    }

    .modal {
      width: 100%;
      max-width: 340px;
      max-height: 80%;
      overflow-y: auto;
      border-radius: 12px;
      padding: 16px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    }

    .modal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
    }

    .modal-close {
      width: 28px;
      height: 28px;
      border: none;
      border-radius: 50%;
      cursor: pointer;
      background: rgba(255, 255, 255, 0.2);
      color: #fff;
    }

    .modal-content {
      padding: 12px;
      border-radius: 8px;
      background: rgba(0, 0, 0, 0.3);
      font-family: Consolas, monospace;
      font-size: 12px;
      line-height: 1.6;
      white-space: pre-wrap;
      word-break: break-word;
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>Logs and Settings</h1>
    <button class="back-btn" id="backBtn">Back</button>
  </div>

  <div class="section">
    <div class="section-title">Attendance status</div>
    <div class="setting-row">
      <span>Today</span>
      <span id="todayStatus" class="status-value pending">Checking...</span>
    </div>
    <div class="setting-row">
      <span>Next check</span>
      <span id="nextCheckTime" class="status-value">Checking...</span>
    </div>
    <button class="btn btn-save" id="manualCheckBtn">Run attendance now</button>
  </div>

  <div class="section">
    <div class="section-title">Attendance logs</div>
    <div class="log-container" id="logContainer">
      <div class="log-entry log-info">Loading logs...</div>
    </div>
    <button class="btn btn-secondary" id="refreshLogBtn">Refresh logs</button>
  </div>

  <div class="section">
    <div class="section-title">Data management</div>
    <div class="btn-row">
      <button class="btn btn-secondary" id="clearLogsBtn">Clear logs</button>
      <button class="btn btn-danger" id="resetAllBtn">Reset all</button>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <div class="modal-overlay" id="logModal">
    <div class="modal">
      <div class="modal-header">
        <span class="modal-title" id="modalTitle">Attendance log</span>
        <button class="modal-close" id="modalClose">X</button>
      </div>
      <div class="modal-content" id="modalContent"></div>
    </div>
  </div>

  <script src="settings.js"></script>
</body>
</html>
