<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="ui.css">
</head>
<body>
  <div class="app">
    <header class="page-head">
      <div class="page-top">
        <button class="back-btn" id="backBtn">← 홈</button>
        <button class="icon-btn" id="globalSettingsBtn" title="전체 설정">⚙</button>
      </div>
      <h1 class="page-title">메인 편집</h1>
      <p class="page-subtitle">메인에 보일 도구와 빠른 이동 즐겨찾기를 정합니다.</p>
    </header>
    <main class="page">
      <section class="card">
        <div class="card-header">
          <div class="title-group">
            <span class="mark blue">도</span>
            <div>
              <div class="card-title">내 도구</div>
              <div class="card-subtitle">체크를 끄면 메인에서 숨겨집니다.</div>
            </div>
          </div>
        </div>
        <div class="card-body">
          <div id="featureManageList" class="manage-list"></div>
        </div>
      </section>

      <section class="card">
        <div class="card-header">
          <div class="title-group">
            <span class="mark green">이</span>
            <div>
              <div class="card-title">빠른 이동 즐겨찾기</div>
              <div class="card-subtitle">최대 6개까지 메인에 바로 표시합니다.</div>
            </div>
          </div>
          <span id="quickCountBadge" class="badge">0개</span>
        </div>
        <div class="card-body">
          <div id="quickManageGrid" class="toggle-grid"></div>
          <p class="hint">더 많은 바로가기는 빠른 이동 전체 페이지에서 사용할 수 있습니다.</p>
        </div>
      </section>

      <button id="saveBtn" class="btn btn-primary" style="width:100%;margin-bottom:12px;">저장</button>
    </main>
  </div>
  <div class="toast" id="toast"></div>
  <script src="home-settings.js"></script>
</body>
</html>
