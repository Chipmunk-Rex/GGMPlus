<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="ui.css">
</head>
<body>
  <div class="app">
    <header class="hero compact-hero">
      <div class="hero-top">
        <span>GGM Town 확장 도구</span>
        <div class="top-actions">
          <button id="editHomeBtn" class="back-btn">메인 편집</button>
          <button id="settingsBtn" class="icon-btn" title="전체 설정">⚙</button>
        </div>
      </div>
      <img class="brand-title compact-title" src="assets/ggmplus-title.png" alt="GGMPlus">
    </header>

    <main class="page">
      <section class="card">
        <div class="card-header">
          <div class="title-group">
            <span class="mark blue">할</span>
            <div>
              <div class="card-title">지금 할 일</div>
              <div class="card-subtitle">바로 처리할 수 있는 것만 보여줍니다.</div>
            </div>
          </div>
          <span id="todayStatusBadge" class="badge pending">확인 중</span>
        </div>
        <div class="card-body">
          <div id="actionList" class="action-list">
            <div class="empty-state">상태를 확인하는 중...</div>
          </div>
        </div>
      </section>

      <section class="card">
        <div class="card-header">
          <div class="title-group">
            <span class="mark green">이</span>
            <div>
              <div class="card-title">빠른 이동</div>
              <div class="card-subtitle">자주 쓰는 곳을 한 번에 엽니다.</div>
            </div>
          </div>
          <button id="allLinksBtn" class="mini-link">전체</button>
        </div>
        <div class="card-body">
          <div id="favoriteQuickGrid" class="quick-grid"></div>
        </div>
      </section>

      <section class="section-head">
        <div>
          <h2>내 도구</h2>
          <p>자주 쓰는 기능만 꺼내놓을 수 있습니다.</p>
        </div>
        <button id="editToolsBtn" class="mini-link">편집</button>
      </section>
      <section id="homeFeatures" class="tool-list"></section>
    </main>
  </div>
  <div class="toast" id="toast"></div>

  <script src="popup.js"></script>
</body>
</html>
