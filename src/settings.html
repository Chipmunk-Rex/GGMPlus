<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="ui.css">
</head>
<body>
  <div class="app">
    <header class="page-head">
      <div class="page-top">
        <button class="back-btn" id="backBtn">← 홈</button>
      </div>
      <h1 class="page-title">전체 설정</h1>
      <p class="page-subtitle">토큰, 공통 로그, 전체 초기화처럼 모든 기능에 걸친 항목만 관리합니다.</p>
    </header>
    <main class="page">
      <section class="card">
        <div class="card-header">
          <div class="title-group">
            <span class="mark blue">계</span>
            <div>
              <div class="card-title">계정/토큰 상태</div>
              <div class="card-subtitle">GGM 로그인 토큰 수집 상태입니다.</div>
            </div>
          </div>
          <span id="tokenBadge" class="badge pending">확인 중</span>
        </div>
        <div class="card-body">
          <div class="metric-grid">
            <div class="metric">
              <span class="metric-label">로그인</span>
              <span id="loginStatus" class="metric-value pending">확인 중...</span>
            </div>
            <div class="metric">
              <span class="metric-label">사용자</span>
              <span id="userName" class="metric-value">-</span>
            </div>
          </div>
          <button id="loginBtn" class="btn btn-secondary" style="display:none;width:100%;margin-top:10px;">로그인하러 가기</button>
        </div>
      </section>

      <section class="card">
        <div class="card-header">
          <div class="title-group">
            <span class="mark green">기</span>
            <div>
              <div class="card-title">공통 활동 기록</div>
              <div class="card-subtitle">확장 프로그램 전체 작업 기록입니다.</div>
            </div>
          </div>
        </div>
        <div class="card-body">
          <div class="list" id="activityContainer">
            <div class="empty-state">기록을 불러오는 중...</div>
          </div>
          <div class="btn-row">
            <button id="refreshActivityBtn" class="btn btn-secondary">새로고침</button>
            <button id="clearActivityBtn" class="btn btn-secondary">기록 삭제</button>
          </div>
        </div>
      </section>

      <section class="card">
        <div class="card-header">
          <div class="title-group">
            <span class="mark orange">데</span>
            <div>
              <div class="card-title">공통 데이터 관리</div>
              <div class="card-subtitle">기능별 삭제는 각 기능 설정에서도 할 수 있습니다.</div>
            </div>
          </div>
        </div>
        <div class="card-body">
          <div class="btn-row">
            <button id="clearLogsBtn" class="btn btn-secondary">출석 로그 삭제</button>
            <button id="clearDraftsBtn" class="btn btn-secondary">임시저장 삭제</button>
          </div>
        </div>
      </section>

      <section class="card">
        <div class="card-header">
          <div class="title-group">
            <span class="mark red">초</span>
            <div>
              <div class="card-title">전체 초기화</div>
              <div class="card-subtitle">토큰, 로그, 설정, 임시저장을 모두 지웁니다.</div>
            </div>
          </div>
        </div>
        <div class="card-body">
          <button id="resetAllBtn" class="btn btn-danger" style="width:100%;">전체 초기화</button>
        </div>
      </section>
    </main>
  </div>
  <div class="toast" id="toast"></div>
  <div class="modal-overlay" id="detailModal">
    <div class="modal">
      <div class="modal-header">
        <span class="modal-title" id="modalTitle">상세</span>
        <button class="modal-close" id="modalClose">×</button>
      </div>
      <div class="modal-content" id="modalContent"></div>
    </div>
  </div>
  <script src="settings.js"></script>
</body>
</html>
