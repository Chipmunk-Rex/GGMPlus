<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="ui.css">
</head>
<body>
  <div class="app">
    <header class="page-head">
      <div class="page-top">
        <button class="back-btn" id="backBtn">뒤로</button>
        <button class="icon-btn" id="globalSettingsBtn" title="전체 설정">⚙</button>
      </div>
      <h1 class="page-title">출석체크</h1>
      <p class="page-subtitle">오늘 출석 상태를 확인하고 필요할 때 바로 실행합니다.</p>
    </header>

    <main class="page">
      <section class="section-head">
        <div>
          <h2>출석 관리</h2>
          <p>자동 실행 주기와 출석 로그를 관리합니다.</p>
        </div>
        <button id="featureSettingsBtn" class="mini-link">출석 설정</button>
      </section>

      <section class="card">
        <div class="card-header">
          <div class="title-group">
            <span class="mark blue">출</span>
            <div>
              <div class="card-title">오늘 출석</div>
              <div class="card-subtitle">자주 확인하는 상태만 보여줍니다.</div>
            </div>
          </div>
          <span id="todayStatusBadge" class="badge pending">확인 중</span>
        </div>
        <div class="card-body">
          <div class="metric-grid">
            <div class="metric">
              <span class="metric-label">로그인</span>
              <span id="loginStatus" class="metric-value pending">확인 중...</span>
            </div>
            <div class="metric">
              <span class="metric-label">마지막 성공</span>
              <span id="lastSuccess" class="metric-value">-</span>
            </div>
          </div>
          <button id="loginBtn" class="btn btn-danger" style="display:none;width:100%;margin-top:10px;">로그인하러 가기</button>
          <button id="checkBtn" class="btn btn-primary" style="width:100%;margin-top:10px;">출석체크 실행</button>
          <p class="hint">자동 실행 주기와 로그는 출석 설정에서 관리합니다.</p>
        </div>
      </section>
    </main>
  </div>

  <div class="toast" id="toast"></div>
  <script src="attendance.js"></script>
</body>
</html>
