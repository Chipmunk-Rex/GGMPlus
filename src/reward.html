<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="ui.css">
</head>
<body>
  <div class="app">
    <header class="page-head">
      <div class="page-top">
        <button class="back-btn" id="backBtn">홈</button>
        <button class="icon-btn" id="globalSettingsBtn" title="전체 설정">⚙</button>
      </div>
      <h1 class="page-title">자동 수령</h1>
      <p class="page-subtitle">완료된 미션 보상과 우편함/골드박스 보상을 자동으로 수령합니다.</p>
    </header>

    <main class="page mission-page">
      <section class="card">
        <div class="card-header">
          <div class="title-group">
            <span class="mark blue">금</span>
            <div>
              <div class="card-title">실행 설정</div>
              <div class="card-subtitle">자동 수령을 켜면 아래 수령 옵션을 세부 설정할 수 있습니다.</div>
            </div>
          </div>
          <span id="rewardStatusBadge" class="badge pending">확인 중</span>
        </div>
        <div class="card-body">
          <label class="toggle-card mission-toggle-wide">
            <input id="autoRewardEnabled" type="checkbox">
            <span class="toggle-visual"></span>
            <span class="toggle-name">자동 수령 활성화</span>
          </label>
          <div class="grid-2 reward-detail-section">
            <div class="field">
              <label for="rewardIntervalMinutes">실행 주기(분)</label>
              <input id="rewardIntervalMinutes" class="setting-input" type="number" min="15" max="1440" step="5">
            </div>
            <div class="field">
              <label for="rewardRunTime">실행 시간(선택)</label>
              <input id="rewardRunTime" class="setting-input" type="time">
            </div>
          </div>
        </div>
      </section>

      <section class="card reward-detail-section">
        <div class="card-header">
          <div class="title-group">
            <span class="mark green">수</span>
            <div>
              <div class="card-title">수령 항목</div>
              <div class="card-subtitle">이미 받은 보상이나 아직 완료되지 않은 항목은 건너뜁니다.</div>
            </div>
          </div>
        </div>
        <div class="card-body">
          <div class="toggle-grid single">
            <label class="toggle-card">
              <input id="rewardClaimDailyMissions" type="checkbox">
              <span class="toggle-visual"></span>
              <span class="toggle-name">일일 미션 보상 자동 수령</span>
            </label>
            <label class="toggle-card">
              <input id="rewardClaimWeeklyMissions" type="checkbox">
              <span class="toggle-visual"></span>
              <span class="toggle-name">주간 미션 보상 자동 수령</span>
            </label>
            <label class="toggle-card">
              <input id="rewardClaimMailbox" type="checkbox">
              <span class="toggle-visual"></span>
              <span class="toggle-name">우편함/골드박스 보상 자동 수령</span>
            </label>
          </div>
        </div>
      </section>

      <section class="card">
        <div class="card-header">
          <div class="title-group">
            <span class="mark red">록</span>
            <div>
              <div class="card-title">최근 실행 결과</div>
              <div class="card-subtitle">수동 실행과 자동 실행 결과를 함께 보여줍니다.</div>
            </div>
          </div>
          <button id="refreshLogsBtn" class="mini-link">새로고침</button>
        </div>
        <div class="card-body">
          <div class="list mission-log-list" id="rewardLogList">
            <div class="empty-state">로그를 불러오는 중...</div>
          </div>
          <div class="btn-row">
            <button id="runNowBtn" class="btn btn-secondary">수동 실행</button>
            <button id="clearLogsBtn" class="btn btn-secondary">로그 삭제</button>
          </div>
        </div>
      </section>
    </main>
  </div>
  <div class="toast" id="toast"></div>
  <div class="modal-overlay" id="detailModal">
    <div class="modal">
      <div class="modal-header">
        <span class="modal-title" id="modalTitle">실행 상세</span>
        <button class="modal-close" id="modalClose">X</button>
      </div>
      <div class="modal-content" id="modalContent"></div>
    </div>
  </div>
  <script src="reward.js"></script>
</body>
</html>
