<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="ui.css">
</head>
<body>
  <div class="app">
    <header class="page-head">
      <div class="page-top">
        <button class="back-btn" id="backBtn">뒤로</button>
        <button class="icon-btn" id="globalSettingsBtn" title="전체 설정">⚙</button>
      </div>
      <h1 class="page-title">관심 알림</h1>
      <p class="page-subtitle">현재 알림 상태를 보고 수동 확인만 빠르게 실행합니다.</p>
    </header>
    <main class="page">
      <section class="section-head">
        <div>
          <h2>알림 관리</h2>
          <p>알림 대상, 확인 간격, 최근 알림 기록을 관리합니다.</p>
        </div>
        <button id="featureSettingsBtn" class="mini-link">알림 설정</button>
      </section>

      <section class="card">
        <div class="card-header">
          <div class="title-group">
            <span class="mark orange">알</span>
            <div>
              <div class="card-title">알림 상태</div>
              <div class="card-subtitle">상세 대상과 확인 간격은 알림 설정에서 관리합니다.</div>
            </div>
          </div>
          <span id="monitorSummary" class="badge">확인 중</span>
        </div>
        <div class="card-body">
          <div class="metric-grid">
            <div class="metric">
              <span class="metric-label">새 글</span>
              <span id="postMonitorStatus" class="metric-value">-</span>
            </div>
            <div class="metric">
              <span class="metric-label">퀘스트/주식</span>
              <span id="questStockStatus" class="metric-value">-</span>
            </div>
          </div>
          <button class="btn btn-primary" id="runMonitorBtn" style="width:100%;margin-top:10px;">지금 확인</button>
          <p class="hint">알림 기록과 세부 조건은 알림 설정에서 확인합니다.</p>
        </div>
      </section>
    </main>
  </div>
  <div class="toast" id="toast"></div>
  <script src="alerts.js"></script>
</body>
</html>
