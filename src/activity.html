<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="ui.css">
</head>
<body>
  <div class="app">
    <header class="page-head">
      <div class="page-top">
        <button class="back-btn" id="backBtn">← 홈</button>
      </div>
      <h1 class="page-title">활동 기록</h1>
      <p class="page-subtitle">활동 기록은 전체 설정의 공통 관리 영역으로 이동했습니다.</p>
    </header>
    <main class="page">
      <section class="card">
        <div class="card-header">
          <div class="title-group">
            <span class="mark green">기</span>
            <div>
              <div class="card-title">공통 로그로 이동</div>
              <div class="card-subtitle">전체 설정에서 활동 기록을 확인하고 삭제할 수 있습니다.</div>
            </div>
          </div>
        </div>
        <div class="card-body">
          <button id="settingsBtn" class="btn btn-primary" style="width:100%;">전체 설정 열기</button>
        </div>
      </section>
    </main>
  </div>
  <script src="activity.js"></script>
</body>
</html>
