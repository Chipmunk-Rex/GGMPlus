<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="ui.css">
</head>
<body>
  <div class="app">
    <header class="page-head">
      <div class="page-top">
        <button class="back-btn" id="backBtn">← 런처</button>
        <button class="icon-btn" id="globalSettingsBtn" title="전체 설정">⚙</button>
      </div>
      <h1 class="page-title">런처 설정</h1>
      <p class="page-subtitle">빠른 이동 기능의 사용자 지정 영역입니다.</p>
    </header>
    <main class="page">
      <section class="card">
        <div class="card-header">
          <div class="title-group">
            <span class="mark green">이</span>
            <div>
              <div class="card-title">기본 바로가기</div>
              <div class="card-subtitle">현재는 고정 바로가기를 제공합니다.</div>
            </div>
          </div>
        </div>
        <div class="card-body">
          <div class="list">
            <div class="list-item"><span class="list-time">타운</span><span class="list-message">GGM Town 홈, 게시판, 퀘스트, 상점, 주식</span></div>
            <div class="list-item"><span class="list-time">학교</span><span class="list-message">동아리, 프로젝트, 졸업작품, 평가, 포트폴리오</span></div>
          </div>
          <p class="hint">사용자 지정 바로가기 편집 기능은 이후 추가할 수 있도록 페이지를 분리해 두었습니다.</p>
        </div>
      </section>
    </main>
  </div>
  <script src="launcher-settings.js"></script>
</body>
</html>
